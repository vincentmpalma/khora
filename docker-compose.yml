services:
  postgres:
    image: postgres:16
    container_name: khora-postgres
    environment:
      POSTGRES_USER: khora
      POSTGRES_PASSWORD: khora
      POSTGRES_DB: khora
    ports:
      - '5432:5432'
    volumes:
      - khora-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: khora-redis
    ports:
      - '6379:6379'

volumes:
  khora-postgres-data:
